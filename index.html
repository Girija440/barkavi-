<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Barkavi😍❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

/* Background */
body{
background:linear-gradient(135deg,#ff4e8d,#ff9a44,#ffd93d);
height:100vh;
overflow:hidden;
}

/* ENTRY SCREEN */
#entry{
position:fixed;
width:100%;
height:100vh;
background:linear-gradient(135deg,#ff4e8d,#ff9a44);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:30px;
cursor:pointer;
z-index:999;
}

/* Main container */
.container{
display:none;
text-align:center;
padding:40px;
color:white;
}

/* Glass card */
.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
width:400px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* Heading */
h1{
font-size:45px;
margin-bottom:10px;
}

/* Cake animation */
.cake{
font-size:80px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-15px);}
}

/* PHOTO SLIDESHOW */
.photo{
width:250px;
height:250px;
border-radius:20px;
overflow:hidden;
margin:20px auto;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.photo img{
width:100%;
height:100%;
object-fit:cover; /* FITS PERFECTLY */
transition:1s;
}

/* Countdown */
#countdown{
font-size:22px;
margin-top:10px;
}

/* Message */
.message{
margin-top:15px;
font-size:18px;
}

/* BALLOONS */
.balloon{
position:absolute;
bottom:-100px;
font-size:35px;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* CONFETTI */
.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<!-- CLICK TO ENTER -->
<div id="entry" onclick="enterSite()">
✨ Click to Enter Barkavi's Birthday ✨
</div>

<!-- MAIN WEBSITE -->
<div class="container" id="main">
<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>
<h1>🎉 Happy Birthday Barkavi 🎉</h1>
<div class="cake">🎂</div>

<div class="card">

<div id="countdown"></div>

<!-- Photo slideshow -->
<div class="photo">
<img id="slide" src="photo 1.jpeg">
</div>

<div class="message">
Dear Barkavi ❤️<br>
May your life shine with happiness, success and endless smiles.
You are truly special. Enjoy your day!
</div>

</div>
</div>

<!-- Balloons -->
<div class="balloon" style="left:10%">🎈</div>
<div class="balloon" style="left:30%">🎈</div>
<div class="balloon" style="left:50%">🎈</div>
<div class="balloon" style="left:70%">🎈</div>
<div class="balloon" style="left:90%">🎈</div>

<script>

/* ENTER BUTTON */
function enterSite(){
document.getElementById("entry").style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("music").play();
}

/* PHOTO SLIDESHOW (SMOOTH FADE) */
let images=["photo 1.jpeg","photo 2.jpeg","photo 3.jpeg","photo 4.jpeg","photo 5.jpeg","photo 7.jpeg"];
let i=0;

setInterval(()=>{
i=(i+1)%images.length;
let slide=document.getElementById("slide");
slide.style.opacity=0;

setTimeout(()=>{
slide.src=images[i];
slide.style.opacity=1;
},500);

},3000);

/* COUNTDOWN */
let birthday=new Date("March 2, 2026 00:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let gap=birthday-now;

let d=Math.floor(gap/(1000*60*60*24));
let h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((gap%(1000*60*60))/(1000*60));
let s=Math.floor((gap%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
"⏳ Birthday Countdown: "+d+"d "+h+"h "+m+"m "+s+"s";
},1000);

/* PREMIUM CONFETTI */
function createConfetti(){
let conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*100+"vw";
conf.style.background=
`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(conf);

setTimeout(()=>conf.remove(),4000);
}

setInterval(createConfetti,150);

</script>

</body>
</html>
